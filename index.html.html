<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>復盤統整工具</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700;900&family=Noto+Sans+TC:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:       #0A0F1E;
    --navy2:      #0E1628;
    --navy3:      #151E35;
    --navy4:      #1C2744;
    --gold:       #C9A84C;
    --gold-light: #E8C96B;
    --warm-white: #F0EFEA;
    --text-body:  #C8D0E0;
    --text-muted: #7A8AAA;
    --red:        #E05A2B;
    --green:      #3DB87A;
    --blue:       #4A90D9;
  }

  html {
    background-color: #0A0F1E;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: #0A0F1E !important;
    background-image:
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 39px,
        rgba(255,255,255,0.025) 39px,
        rgba(255,255,255,0.025) 40px
      ),
      repeating-linear-gradient(
        90deg,
        transparent,
        transparent 39px,
        rgba(255,255,255,0.025) 39px,
        rgba(255,255,255,0.025) 40px
      );
    color: #F0EFEA;
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    min-width: 320px;
    overflow-x: hidden;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #0E1628 0%, #1C2744 100%);
    border-bottom: 1px solid rgba(201,168,76,0.25);
    padding: 24px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: relative;
    overflow: hidden;
    box-sizing: border-box;
    width: 100%;
  }
  .header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 70% 50%, rgba(201,168,76,0.07) 0%, transparent 65%);
    pointer-events: none;
  }
  .header-icon {
    width: 62px; height: 62px;
    background: transparent;
    border-radius: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    flex-shrink: 0;
    box-shadow: none;
  }
  .header-text h1 {
    font-family: 'Noto Serif TC', serif;
    font-weight: 900;
    font-size: 22px;
    letter-spacing: 0.06em;
    color: #F0EFEA;
  }
  .header-text p {
    font-size: 12px;
    color: #7A8AAA;
    margin-top: 4px;
    letter-spacing: 0.1em;
  }


  /* CONTAINER */
  .container {
    max-width: 860px;
    width: 100%;
    margin: 0 auto;
    padding: 48px 24px 100px;
    box-sizing: border-box;
  }

  /* SECTION LABEL */
  .section-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 0.2em;
    color: #C9A84C;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, rgba(201,168,76,0.3), transparent);
  }

  /* TYPE SELECTOR */
  .type-selector {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 12px;
    margin-bottom: 40px;
  }
  .type-btn {
    background: #151E35;
    border: 1px solid rgba(201,168,76,0.18);
    border-radius: 12px;
    padding: 18px 8px;
    cursor: pointer;
    text-align: center;
    transition: all 0.25s ease;
    color: #C8D0E0;
    position: relative;
    overflow: hidden;
    min-width: 0;
    word-break: keep-all;
  }
  .type-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(201,168,76,0.06), transparent 70%);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .type-btn:hover::before { opacity: 1; }
  .type-btn:hover {
    border-color: rgba(201,168,76,0.5);
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.3), 0 0 0 1px rgba(201,168,76,0.12);
  }
  .type-btn.active {
    background: linear-gradient(135deg, #1e2a45, #162038);
    border-color: #C9A84C;
    color: #F0EFEA;
    box-shadow: 0 0 20px rgba(201,168,76,0.2), inset 0 1px 0 rgba(201,168,76,0.25);
  }
  .type-btn .type-icon { font-size: 26px; margin-bottom: 10px; }
  .type-btn .type-label {
    font-family: 'Noto Serif TC', serif;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.06em;
    display: block;
    margin-bottom: 6px;
  }
  .type-btn .type-sub {
    font-size: 11px;
    color: #7A8AAA;
    letter-spacing: 0.02em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .type-btn.active .type-sub { color: #C9A84C; }
  .type-btn.active .type-label { color: #F0EFEA; }

  /* CARDS */
  .card {
    background: #151E35;
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 16px;
    padding: 28px 32px;
    margin-bottom: 20px;
    transition: border-color 0.25s, box-shadow 0.25s, transform 0.25s;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(201,168,76,0.25), transparent);
  }
  .card:hover {
    border-color: rgba(201,168,76,0.35);
    transform: translateY(-2px);
    box-shadow: 0 12px 32px rgba(0,0,0,0.25);
  }
  .card-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 12px;
    letter-spacing: 0.2em;
    color: #C9A84C;
    margin-bottom: 8px;
  }
  .card-title {
    font-family: 'Noto Serif TC', serif;
    font-weight: 700;
    font-size: 17px;
    color: #F0EFEA;
    margin-bottom: 10px;
    line-height: 1.5;
  }
  .card-hint {
    font-size: 13px;
    color: #7A8AAA;
    margin-bottom: 16px;
    line-height: 1.7;
  }

  /* TEXTAREA */
  textarea {
    width: 100%;
    background: #0E1628;
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 10px;
    padding: 16px 18px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    color: #C8D0E0;
    resize: vertical;
    min-height: 160px;
    line-height: 1.8;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }
  textarea:focus {
    border-color: rgba(201,168,76,0.45);
    box-shadow: 0 0 0 3px rgba(201,168,76,0.07);
  }
  textarea::placeholder { color: rgba(122,138,170,0.5); }

  /* BUTTONS */
  .action-bar {
    display: flex;
    gap: 14px;
    align-items: center;
    margin-top: 10px;
  }
  .btn-primary {
    background: linear-gradient(135deg, #C9A84C, #E8C96B);
    color: #0A0F1E;
    border: none;
    border-radius: 10px;
    padding: 15px 36px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.06em;
    transition: all 0.25s ease;
    display: flex;
    align-items: center;
    gap: 8px;
    position: relative;
    overflow: hidden;
  }
  .btn-primary::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.08);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .btn-primary:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(201,168,76,0.4), 0 0 40px rgba(201,168,76,0.15);
  }
  .btn-primary:hover:not(:disabled)::after { opacity: 1; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-secondary {
    background: transparent;
    color: #7A8AAA;
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 10px;
    padding: 15px 22px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.04em;
  }
  .btn-secondary:hover {
    border-color: rgba(201,168,76,0.45);
    color: #C9A84C;
  }

  /* LOADING */
  .loading-area {
    display: none;
    text-align: center;
    padding: 56px 40px;
    background: #151E35;
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 16px;
    margin-top: 24px;
  }
  .loading-area.show { display: block; }
  .spinner-wrap {
    position: relative;
    width: 48px; height: 48px;
    margin: 0 auto 20px;
  }
  .spinner {
    width: 48px; height: 48px;
    border: 2px solid rgba(201,168,76,0.12);
    border-top-color: #C9A84C;
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  .spinner-inner {
    position: absolute;
    top: 8px; left: 8px;
    width: 32px; height: 32px;
    border: 2px solid rgba(201,168,76,0.08);
    border-bottom-color: #E8C96B;
    border-radius: 50%;
    animation: spin 0.6s linear infinite reverse;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 0.2em;
    color: #C9A84C;
    margin-bottom: 8px;
  }
  .loading-text {
    font-size: 13px;
    color: #7A8AAA;
    font-style: italic;
    min-height: 20px;
    transition: opacity 0.3s;
  }

  /* RESULT */
  .result-area {
    display: none;
    background: #151E35;
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 16px;
    overflow: hidden;
    margin-top: 24px;
    box-shadow: 0 16px 48px rgba(0,0,0,0.3);
  }
  .result-area.show { display: block; }

  .result-header {
    background: linear-gradient(135deg, #1C2744, #0E1628);
    border-bottom: 1px solid rgba(201,168,76,0.2);
    padding: 18px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .result-header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .result-icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, rgba(201,168,76,0.2), rgba(201,168,76,0.08));
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
  }
  .result-title-text {
    font-family: 'Noto Serif TC', serif;
    font-weight: 700;
    font-size: 15px;
    color: #F0EFEA;
    letter-spacing: 0.04em;
  }
  .result-badge {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 11px;
    letter-spacing: 0.14em;
    color: #0A0F1E;
    background: linear-gradient(135deg, #C9A84C, #E8C96B);
    padding: 3px 10px;
    border-radius: 3px;
  }
  .btn-copy {
    background: rgba(201,168,76,0.08);
    color: #C9A84C;
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 8px;
    padding: 8px 18px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.06em;
    transition: all 0.2s;
  }
  .btn-copy:hover {
    background: rgba(201,168,76,0.15);
    border-color: #C9A84C;
    box-shadow: 0 0 12px rgba(201,168,76,0.15);
  }

  .result-body {
    padding: 32px;
    font-size: 14px;
    line-height: 2;
    color: #C8D0E0;
    font-family: 'Noto Sans TC', sans-serif;
    border-bottom: 1px solid rgba(201,168,76,0.1);
    word-break: break-word;
  }
  .result-body strong {
    color: #F0EFEA;
    font-weight: 700;
  }
  .result-body em {
    color: #C9A84C;
    font-style: normal;
  }
  .result-body br + br {
    display: block;
    content: '';
    margin-top: 4px;
  }

  .result-footer {
    background: rgba(201,168,76,0.04);
    padding: 18px 28px;
    font-size: 12.5px;
    color: #7A8AAA;
    line-height: 1.7;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .result-footer-icon {
    color: #C9A84C;
    font-size: 15px;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .result-footer strong { color: #C9A84C; }

  /* ERROR */
  .error-area {
    display: none;
    background: rgba(224,90,43,0.08);
    border: 1px solid rgba(224,90,43,0.3);
    border-radius: 12px;
    padding: 20px 24px;
    margin-top: 20px;
    font-size: 13px;
    color: #E05A2B;
    letter-spacing: 0.02em;
  }
  .error-area.show { display: block; }

  /* FADE-UP ANIMATION */
  .fade-up {
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  .fade-up.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* RESPONSIVE */
  @media (max-width: 860px) {
    .type-btn .type-sub { font-size: 10px; }
    .type-btn .type-label { font-size: 14px; }
  }
  @media (max-width: 680px) {
    .type-selector { grid-template-columns: repeat(2, 1fr); }
    .container { padding: 24px 16px 60px; }
    .header { padding: 18px 20px; }
  }
  @media (max-width: 400px) {
    .type-selector { grid-template-columns: repeat(2, 1fr); }
    .type-btn { padding: 14px 6px; }
    .type-btn .type-icon { font-size: 20px; }
    .type-btn .type-label { font-size: 13px; }
    .type-btn .type-sub { display: none; }
    .header-text h1 { font-size: 18px; }
  }
</style>
</head>

function selectType(type, btn) {
  currentType = type;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const c = typeConfig[type];
  document.getElementById('inputLabel').textContent = c.inputLabel;
  document.getElementById('inputTitle').textContent = c.inputTitle;
  document.getElementById('inputHint').textContent = c.inputHint;
  document.getElementById('mainInput').placeholder = c.placeholder;
  hideResults();
}

function hideResults() {
  document.getElementById('resultArea').classList.remove('show', 'visible');
  document.getElementById('loadingArea').classList.remove('show');
  document.getElementById('errorArea').classList.remove('show');
}

function clearAll() {
  document.getElementById('mainInput').value = '';
  document.getElementById('goalInput').value = '';
  hideResults();
}

const loadingMessages = [
  'AI 正在閱讀你的筆記...',
  '分析成就與挑戰模式...',
  '提煉關鍵洞察與教訓...',
  '整理成結構化報告...',
  '最後潤色中...'
];

async function generate() {
  const notes = document.getElementById('mainInput').value.trim();
  const goals = document.getElementById('goalInput').value.trim();
  if (!notes) {
    const ta = document.getElementById('mainInput');
    ta.style.borderColor = 'rgba(224,90,43,0.6)';
    ta.style.boxShadow = '0 0 0 3px rgba(224,90,43,0.08)';
    setTimeout(() => { ta.style.borderColor = ''; ta.style.boxShadow = ''; }, 2500);
    ta.focus();
    return;
  }

  const config = typeConfig[currentType];
  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  hideResults();

  const loadingArea = document.getElementById('loadingArea');
  loadingArea.classList.add('show');

  let msgIdx = 0;
  document.getElementById('loadingText').textContent = loadingMessages[0];
  const msgInterval = setInterval(() => {
    msgIdx = (msgIdx + 1) % loadingMessages.length;
    const el = document.getElementById('loadingText');
    el.style.opacity = '0';
    setTimeout(() => {
      el.textContent = loadingMessages[msgIdx];
      el.style.opacity = '1';
    }, 200);
  }, 2800);

  let userContent = `以下是我的${config.label}筆記，請幫我整理成報告：\n\n${notes}`;
  if (goals) userContent += `\n\n---\n我的年度目標 / OKR：\n${goals}`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
          'Content-Type': 'application/json',
          'x-api-key': '在這裡貼上你的API_KEY',
          'anthropic-version': '2023-06-01'
        },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: config.prompt,
        messages: [{ role: 'user', content: userContent }]
      })
    });

    clearInterval(msgInterval);

    if (!response.ok) throw new Error(`API 錯誤 ${response.status}`);

    const data = await response.json();
    const text = data.content.map(i => i.text || '').join('');

    loadingArea.classList.remove('show');
    document.getElementById('resultTitle').textContent = config.resultTitle;
    document.getElementById('resultBody').innerHTML = parseMarkdown(text);

    const resultArea = document.getElementById('resultArea');
    resultArea.classList.add('show');
    setTimeout(() => resultArea.classList.add('visible'), 50);
    resultArea.scrollIntoView({ behavior: 'smooth', block: 'start' });

  } catch (err) {
    clearInterval(msgInterval);
    loadingArea.classList.remove('show');
    const errorArea = document.getElementById('errorArea');
    errorArea.textContent = `⚠️ 發生錯誤：${err.message}。請稍後再試。`;
    errorArea.classList.add('show');
  } finally {
    btn.disabled = false;
  }
}

function parseMarkdown(text) {
  return text
    // **粗體**
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    // *斜體*
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    // 分隔線 ---
    .replace(/^---$/gm, '<hr style="border:none;border-top:1px solid rgba(201,168,76,0.2);margin:16px 0;">')
    // 換行
    .replace(/
/g, '<br>');
}

function copyResult() {
  const text = document.getElementById('resultBody').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.btn-copy');
    btn.textContent = '✓ 已複製';
    setTimeout(() => { btn.textContent = '複製全文'; }, 2000);
  });
}

// IntersectionObserver for fade-up
const observer = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      e.target.classList.add('visible');
      observer.unobserve(e.target);
    }
  });
}, { threshold: 0.1 });

document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));
</script>
